# ============================================================
#  OpenEvolve 設定檔 —— 課堂用(本地 Ollama + 7B 模型)
# ============================================================
#  這份設定刻意為「最差情況的 8GB 顯卡」調過,壓小 context、降低 VRAM 壓力。
#  如果你的顯卡是 20GB 以上(RTX 4000 Ada / Blackwell),
#  可以把 model 換成 qwen2.5-coder:14b,並把下面的數字調大,效果更好。
# ============================================================

# ---- LLM:連到「本機」的 Ollama ----
llm:
  api_base: "http://localhost:11434/v1"   # 本機 Ollama 的位址,不用改
  model: "qwen2.5-coder:7b"                # 課前已用 ollama pull 下載的模型
  temperature: 0.7
  max_tokens: 4096

# ---- 演化規模:課堂用,刻意縮小,確保 30 代內快速跑完 ----
max_iterations: 30

database:
  population_size: 6      # 同時維持的程式數量(小=省 VRAM、跑得快)
  num_islands: 2          # 平行演化的「島」數量

# ---- prompt:壓小塞給 LLM 的歷史版本數量,減輕 8GB 卡的 KV cache 壓力 ----
prompt:
  num_top_programs: 2     # 參考「最好的幾個」版本
  num_diverse_programs: 1 # 參考「比較不一樣的」版本(維持多樣性)
